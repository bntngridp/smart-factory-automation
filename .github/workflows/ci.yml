name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20' # Sesuaikan dengan versi Node kamu (20 atau 22)
          cache: 'npm'

      # Langkah Pintar: Jalankan SQL Server langsung lewat Docker CLI (Lebih Stabil)
      - name: Start SQL Server Local Container
        run: |
          docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=YourStrong@Password123" \
          -p 1433:1433 \
          --name sql_server \
          -d mcr.microsoft.com/azure-sql-edge:latest

          # Tunggu sampai SQL Server benar-benar siap menerima koneksi
          echo "Waiting for SQL Server to boot up..."
          sleep 15

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint
        working-directory: apps/web

      - name: Run TypeCheck (TypeScript)
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Setup Prisma Schema & Seeder
        run: |
          npx prisma db push
          npx prisma db seed
        working-directory: apps/web
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=InventoryDB;user=sa;password=YourStrong@Password123;encrypt=true;trustServerCertificate=true;"

      - name: Run Automated API Integration Test
        run: npm run test:api
        working-directory: apps/web
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=InventoryDB;user=sa;password=YourStrong@Password123;encrypt=true;trustServerCertificate=true;"
