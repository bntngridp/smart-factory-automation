name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Start SQL Server Local Container
        run: |
          docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=YourStrong@Password123" \
          -p 1433:1433 \
          --name sql_server \
          -d mcr.microsoft.com/azure-sql-edge:latest

          echo "Waiting for SQL Server to boot up..."
          sleep 20

      - name: Install Dependencies
        run: npm install
        working-directory: apps/web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/web

      - name: Run Linter
        run: npm run lint
        working-directory: apps/web

      - name: Run TypeCheck (TypeScript)
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Setup Prisma Schema & Seeder
        run: |
          npx prisma db push --skip-generate
          npx prisma db seed
        working-directory: apps/web
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=InventoryDB;user=sa;password=YourStrong@Password123;encrypt=true;trustServerCertificate=true;"

      - name: Start Next.js dev server
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo "Waiting for dev server to be ready..."
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$code" = "200" ]; then
              echo "Dev server is ready!"
              exit 0
            fi
            echo "Attempt $i/40 — current code=$code — waiting 3s..."
            sleep 3
          done
          echo "Dev server failed to start"
          tail -80 /tmp/next-dev.log
          exit 1
        working-directory: apps/web
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=InventoryDB;user=sa;password=YourStrong@Password123;encrypt=true;trustServerCertificate=true;"

      - name: Run Automated API Integration Test
        run: npm run test:api
        working-directory: apps/web
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=InventoryDB;user=sa;password=YourStrong@Password123;encrypt=true;trustServerCertificate=true;"

      - name: Stop dev server
        if: always()
        run: pkill -f "next dev" || true
