name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Menggunakan Node.js 24 sesuai regulasi GitHub Actions Juni 2026
      - name: Setup Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Opsi cache dihapus agar GitHub tidak memaksa mencari lockfile di folder root

      # Menyalakan Azure SQL Edge via Docker CLI
      - name: Start SQL Server Local Container
        run: |
          docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=YourStrong@Password123" \
          -p 1433:1433 \
          --name sql_server \
          -d mcr.microsoft.com/azure-sql-edge:latest

          echo "Waiting for SQL Server to boot up..."
          sleep 15

      # Memaksa install dependency di folder web tempat Next.js & package.json berada
      - name: Install Dependencies
        run: npm install
        working-directory: apps/web

      # PENTING: Generate Prisma Client agar type definitions tersedia untuk TypeScript
      # Tanpa step ini, @prisma/client tidak punya type 'PrismaClient' di CI
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/web

      - name: Run Linter
        run: npm run lint
        working-directory: apps/web

      - name: Run TypeCheck (TypeScript)
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Setup Prisma Schema & Seeder
        run: |
          npx prisma db push
          npx prisma db seed
        working-directory: apps/web
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=InventoryDB;user=sa;password=YourStrong@Password123;encrypt=true;trustServerCertificate=true;"

      - name: Run Automated API Integration Test
        run: npm run test:api
        working-directory: apps/web
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=InventoryDB;user=sa;password=YourStrong@Password123;encrypt=true;trustServerCertificate=true;"
