name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, TypeCheck, Test
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-CU13-ubuntu-22.04
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "BintangRidwan8!"
          MSSQL_PID: "Express"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "bash -c 'cat < /dev/tcp/localhost/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          echo 'DATABASE_URL="sqlserver://localhost:1433;database=InventoryDB;user=sa;password=BintangRidwan8!;encrypt=true;trustServerCertificate=true;"' > .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Wait for SQL Server port
        run: |
          echo "Waiting for SQL Server to accept connections..."
          for i in $(seq 1 60); do
            if bash -c 'cat < /dev/tcp/localhost/1433' > /dev/null 2>&1; then
              echo "SQL Server port 1433 is open!"
              exit 0
            fi
            echo "Attempt $i/60 — port not ready, waiting 3s..."
            sleep 3
          done
          echo "SQL Server port 1433 never became ready"
          exit 1

      - name: Wait for SQL Server to fully boot
        run: |
          echo "Waiting extra 20s for SQL Server to fully initialize..."
          sleep 20

      - name: Prisma DB Push
        run: npx prisma db push

      - name: Seed database
        run: npx prisma db seed

      - name: Start dev server
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo "Waiting for dev server to start..."
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$code" = "200" ]; then
              echo "Dev server is ready (200 OK)!"
              exit 0
            fi
            echo "Attempt $i/40 — current code=$code — waiting 3s..."
            sleep 3
          done
          echo "Dev server failed to start"
          tail -80 /tmp/next-dev.log
          exit 1

      - name: Run integration tests
        run: npm run test:api

      - name: Stop dev server
        if: always()
        run: pkill -f "next dev" || true
