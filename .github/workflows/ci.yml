name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, TypeCheck, Test
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/azure-sql-edge
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Bintangridwan8"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Bintangridwan8 -Q 'SELECT 1' || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          echo 'DATABASE_URL="sqlserver://localhost:1433;database=InventoryDB;user=sa;password=Bintangridwan8;encrypt=true;trustServerCertificate=true;"' > .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Install sqlcmd
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin/" >> $GITHUB_PATH

      - name: Wait for SQL Server
        run: |
          echo "Waiting for SQL Server to be ready..."
          for i in $(seq 1 30); do
            if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Bintangridwan8" -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done
          echo "SQL Server failed to start"
          exit 1

      - name: Create InventoryDB database
        run: |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Bintangridwan8" -Q "IF NOT EXISTS (SELECT * FROM sys.databases WHERE name='InventoryDB') CREATE DATABASE InventoryDB;"

      - name: Prisma DB Push
        run: npx prisma db push

      - name: Seed database
        run: npx prisma db seed

      - name: Start dev server
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo "Waiting for dev server to start..."
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$code" = "200" ]; then
              echo "Dev server is ready (200 OK)!"
              exit 0
            fi
            echo "Attempt $i/40 — current code=$code — waiting 3s..."
            sleep 3
          done
          echo "Dev server failed to start"
          tail -50 /tmp/next-dev.log
          exit 1

      - name: Run integration tests
        run: npm run test:api

      - name: Stop dev server
        if: always()
        run: pkill -f "next dev" || true
